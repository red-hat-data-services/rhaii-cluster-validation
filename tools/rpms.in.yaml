contentOrigin:
  repofiles:
    - ../rpm-repos/ubi.repo
    - ../rpm-repos/redhat.repo

packages:
  # Builder stage (build dependencies for perftest)
  - gcc
  - gcc-c++
  - make
  - diffutils
  - pciutils-devel
  - rdma-core-devel
  - libibverbs-devel
  - librdmacm-devel
  - libibumad-devel
  # Runtime stage
  - wget
  - procps-ng
  - jq
  - bc
  - iputils
  - ethtool
  - net-tools
  - numactl
  - kmod
  - systemd-udev
  - libpcap
  - python3
  - hostname
  - iperf3
  - tcpdump
  - pciutils
  - libibverbs
  - libibumad
  - librdmacm
  - infiniband-diags

arches:
  - x86_64
  - aarch64

context:
  containerfile: ../Dockerfile.konflux.validator.tools

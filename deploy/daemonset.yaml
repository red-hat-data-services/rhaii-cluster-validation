apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rhaii-validate-agent
  namespace: rhaii-validation
  labels:
    app: rhaii-validate-agent
spec:
  selector:
    matchLabels:
      app: rhaii-validate-agent
  template:
    metadata:
      labels:
        app: rhaii-validate-agent
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: ${IMG}
          args:
            - run
            - --node-name
            - $(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            privileged: true
          # No GPU resource request — agent only queries nvidia-smi,
          # doesn't run CUDA workloads. Privileged mode provides access.
          volumeMounts:
            - name: nvidia
              mountPath: /usr/bin/nvidia-smi
              subPath: nvidia-smi
              readOnly: true
            - name: config
              mountPath: /etc/rhaii-validate
              readOnly: true
      volumes:
        - name: nvidia
          hostPath:
            path: /usr/bin
            type: Directory
        - name: config
          configMap:
            name: rhaii-validate-config
            optional: true  # Agent falls back to embedded defaults if missing
      restartPolicy: Always
      serviceAccountName: rhaii-validate-agent

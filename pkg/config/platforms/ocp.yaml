platform: OCP

agent:
  requests:
    cpu: "500m"
    memory: "512Mi"
  annotations: {}

jobs:
  requests:
    cpu: "500m"
    memory: "512Mi"
    # RDMA resource — varies by cluster, add to both requests and limits:
    #   nvidia.com/roce: "1"
    #   rdma/rdma_shared_device_a: "1"
  limits: {}
  annotations: {}
  # rdma_type: roce or ib (set based on your cluster's RDMA fabric)

gpu:
  min_driver_version: "535.0"

crds:
  min_api_versions:
    # Minimum API version required for each CRD (empty = any version)
    gateways.gateway.networking.k8s.io: ""
    httproutes.gateway.networking.k8s.io: ""
    inferencepools.inference.networking.x-k8s.io: ""
    leaderworkersets.leaderworkerset.x-k8s.io: ""
    certificates.cert-manager.io: ""
  min_release_versions:
    # Minimum release version for each CRD (empty = report only)
    gateways.gateway.networking.k8s.io: ""
    httproutes.gateway.networking.k8s.io: ""
    inferencepools.inference.networking.x-k8s.io: ""

operators:
  namespaces:
    cert-manager:
      - cert-manager-operator
      - cert-manager
    istio:
      - istio-system
    lws:
      - openshift-lws-operator

thresholds:
  tcp_bandwidth_gbps:
    pass: 5
    warn: 1
  tcp_latency_ms:
    pass: 0.5
    warn: 1.0
  rdma_bandwidth_pd_gbps:
    pass: 180
    warn: 100
  rdma_bandwidth_wep_gbps:
    pass: 350
    warn: 200
